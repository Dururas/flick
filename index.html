<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flick</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a38;--accent:#7c6aff;--accent2:#ff6ab0;--accent3:#6affce;--text:#f0eeff;--muted:#7a7a9a;--danger:#ff4d6a;--warn:#ffaa30;--success:#30ffaa;--radius:18px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh}
.app{min-height:100vh;background:var(--bg)}
.hidden{display:none!important}
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,10,15,0.87);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.03em}
.topbar-actions{display:flex;gap:0.6rem;align-items:center;cursor:pointer}
.btn{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.03em;border:none;cursor:pointer;border-radius:50px;padding:0.5rem 1.2rem;transition:all 0.18s ease;display:inline-flex;align-items:center;gap:0.4rem}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(124,106,255,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,106,255,0.5)}
.btn-primary:disabled{opacity:0.4;transform:none;cursor:not-allowed}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:0.3rem 0.8rem;font-size:0.7rem}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff;flex-shrink:0;border:2px solid transparent;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-ring{border-color:var(--accent)}
.avatar-lg{width:56px;height:56px;font-size:1.2rem}
.avatar-xl{width:84px;height:84px;font-size:1.8rem}
.stories-bar{padding:1.2rem 1rem 0.8rem;display:flex;gap:1rem;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.stories-bar::-webkit-scrollbar{display:none}
.story-bubble{display:flex;flex-direction:column;align-items:center;gap:0.4rem;cursor:pointer;flex-shrink:0;transition:transform 0.18s}
.story-bubble:hover{transform:scale(1.05)}
.story-ring{width:64px;height:64px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3))}
.story-ring-inner{width:100%;height:100%;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden}
.story-ring-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.story-name{font-size:0.65rem;font-weight:600;color:var(--muted);max-width:64px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.add-story-btn .story-ring-inner{background:var(--surface);border:2px dashed var(--border);font-size:1.4rem;color:var(--muted)}
.feed{max-width:520px;margin:0 auto;padding:1rem 0 5rem}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin:1rem 1rem;overflow:hidden;animation:popIn 0.35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(0.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.post-header{display:flex;align-items:center;padding:0.9rem 1rem;gap:0.7rem}
.post-author-info{flex:1;min-width:0}
.post-author-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-time{font-size:0.68rem;color:var(--muted);margin-top:1px}
.post-mood-badge{font-size:0.7rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:50px;background:rgba(124,106,255,0.15);color:var(--accent);white-space:nowrap}
.post-menu-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:0.3rem;border-radius:50%;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.post-menu-btn:hover{background:rgba(255,255,255,0.07);color:var(--danger)}
.post-image-wrap{position:relative;width:100%;aspect-ratio:1/1;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center}
.img-blur-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(18px) brightness(0.6) saturate(1.4);transform:scale(1.1);display:block}
.img-main{position:relative;z-index:1;max-width:100%;max-height:100%;width:auto;height:100%;object-fit:contain;display:block}
.post-no-image{width:100%;aspect-ratio:1/1;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:4rem}
.post-actions{display:flex;align-items:center;gap:0.2rem;padding:0.2rem 0.6rem 0.4rem}
.action-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:0.35rem;padding:0.5rem 0.6rem;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;color:var(--muted);transition:all 0.15s}
.action-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.action-btn.liked{color:var(--accent2)}
.action-btn.saved{color:var(--accent3)}
.action-btn svg{width:20px;height:20px}
.action-spacer{flex:1}
.reactions-row{padding:0 1rem 0.5rem;display:flex;gap:0.4rem;flex-wrap:wrap}
.reaction-chip{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:0.2rem 0.6rem;font-size:0.8rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:0.25rem;font-weight:600}
.reaction-chip:hover,.reaction-chip.active{background:rgba(124,106,255,0.15);border-color:var(--accent);color:var(--accent)}
.reaction-chip .count{font-size:0.7rem;color:var(--muted)}
.post-caption{padding:0 1rem 0.6rem;font-size:0.9rem;line-height:1.55;color:var(--text)}
.post-caption strong{font-weight:700;color:var(--text);margin-right:0.4rem}
.comments-preview{padding:0 1rem 0.8rem}
.comment-line{font-size:0.82rem;line-height:1.5;color:var(--muted);margin-bottom:0.35rem;display:flex;align-items:flex-start;gap:0.4rem}
.c-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0;margin-top:1px}
.c-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.c-txt strong{color:var(--text);font-weight:700;margin-right:0.3rem}
.view-more-btn{background:none;border:none;cursor:pointer;font-size:0.78rem;color:var(--muted);font-family:'Nunito',sans-serif;padding:0;margin-bottom:0.4rem;display:block}
.view-more-btn:hover{color:var(--accent)}
.add-comment-row{display:flex;gap:0.5rem;align-items:center;padding:0.6rem 1rem;border-top:1px solid var(--border)}
.comment-input{flex:1;background:none;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:0.85rem;color:var(--text);padding:0.3rem 0}
.comment-input::placeholder{color:var(--muted)}
.send-btn{background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;color:var(--accent);padding:0}
.send-btn:disabled{opacity:0.3;cursor:default}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.4rem;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.4rem;line-height:1;transition:color 0.15s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.4rem;display:flex;flex-direction:column;gap:1.1rem}
.confirm-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;max-width:340px;width:100%;text-align:center;animation:slideUp 0.3s cubic-bezier(.34,1.56,.64,1)}
.confirm-box h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:0.5rem}
.confirm-box p{font-size:0.85rem;color:var(--muted);margin-bottom:1.4rem}
.confirm-actions{display:flex;gap:0.7rem;justify-content:center}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface)}
.drop-zone.drag-over,.drop-zone:hover{border-color:var(--accent);background:rgba(124,106,255,0.06)}
.drop-zone .dz-icon{font-size:2.5rem;margin-bottom:0.5rem}
.drop-zone p{font-size:0.85rem;color:var(--muted)}
.drop-zone p span{color:var(--accent);font-weight:700}
.preview-img{width:100%;border-radius:var(--radius-sm);max-height:280px;object-fit:cover;display:block}
.field{display:flex;flex-direction:column;gap:0.4rem}
.field label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted)}
.field input,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.7rem 1rem;font-family:'Nunito',sans-serif;font-size:0.9rem;color:var(--text);outline:none;transition:border-color 0.18s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.char-count{font-size:0.7rem;color:var(--muted);text-align:right;margin-top:0.2rem}
.mood-grid{display:flex;flex-wrap:wrap;gap:0.5rem}
.mood-pill{padding:0.35rem 0.8rem;border-radius:50px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.15s;display:flex;align-items:center;gap:0.3rem}
.mood-pill:hover{border-color:var(--accent)}
.mood-pill.selected{background:rgba(124,106,255,0.2);border-color:var(--accent);color:var(--accent)}
.mod-status{border-radius:var(--radius-sm);padding:0.9rem 1rem;font-size:0.85rem;line-height:1.5;display:flex;gap:0.7rem;align-items:flex-start}
.mod-status.checking{background:rgba(124,106,255,0.1);border:1px solid rgba(124,106,255,0.3);color:var(--accent)}
.mod-status.safe{background:rgba(48,255,170,0.08);border:1px solid rgba(48,255,170,0.3);color:var(--success)}
.mod-status.unsafe{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);color:var(--danger)}
.mod-status.warn{background:rgba(255,170,48,0.1);border:1px solid rgba(255,170,48,0.3);color:var(--warn)}
.mod-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.mod-text strong{display:block;font-weight:700;margin-bottom:0.2rem}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg);position:relative;overflow:hidden}
.auth-glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);opacity:0.15;pointer-events:none}
.auth-glow-1{background:var(--accent);top:-100px;left:-100px}
.auth-glow-2{background:var(--accent2);bottom:-100px;right:-100px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:400px;position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:1.8rem}
.auth-logo h1{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-logo p{font-size:0.88rem;color:var(--muted);margin-top:0.3rem}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.auth-tab{flex:1;padding:0.6rem;background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:var(--muted);transition:all 0.18s}
.auth-tab.active{background:var(--accent);color:#fff}
.auth-fields{display:flex;flex-direction:column;gap:0.9rem}
.error-banner{background:rgba(255,77,106,0.12);border:1px solid rgba(255,77,106,0.35);border-radius:var(--radius-sm);padding:0.6rem 0.9rem;font-size:0.8rem;color:var(--danger)}
.empty-feed{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-feed .big-emoji{font-size:4rem;margin-bottom:1rem}
.empty-feed h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--text);margin-bottom:0.4rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);border-top-color:currentColor;animation:spin 0.6s linear infinite;display:inline-block}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:50px;padding:0.7rem 1.4rem;font-size:0.85rem;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;white-space:nowrap;animation:toastIn 0.3s cubic-bezier(.34,1.56,.64,1)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.profile-header{padding:2rem 1.5rem 1.5rem;display:flex;align-items:flex-start;gap:1.5rem;border-bottom:1px solid var(--border);max-width:520px;margin:0 auto}
.profile-info{flex:1;min-width:0}
.profile-stats{display:flex;gap:1.2rem;margin-top:0.7rem;flex-wrap:wrap}
.stat{text-align:center}
.stat .num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
.stat .lbl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.profile-bio{font-size:0.84rem;color:var(--muted);margin-top:0.4rem;line-height:1.5}
.avatar-wrap{position:relative;cursor:pointer;flex-shrink:0}
.avatar-wrap:hover .av-overlay{opacity:1}
.av-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;font-size:0.65rem;color:#fff;font-weight:700;font-family:'Syne',sans-serif;text-align:center;border:2px solid var(--accent)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:0.6rem 0 0.8rem;z-index:100}
.nav-item{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0.2rem;padding:0.3rem 0.8rem;color:var(--muted);transition:color 0.15s;position:relative}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:0.58rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.nav-post-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,106,255,0.45);transition:transform 0.18s,box-shadow 0.18s}
.nav-post-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(124,106,255,0.6)}
.nav-post-btn svg{width:20px;height:20px;color:#fff}
.nav-badge{position:absolute;top:0;right:4px;width:16px;height:16px;border-radius:50%;background:var(--accent2);color:#fff;font-size:0.55rem;font-weight:800;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.tag{display:inline-block;background:rgba(124,106,255,0.12);color:var(--accent);border-radius:4px;padding:0.1rem 0.4rem;font-size:0.75rem;font-weight:700;margin-right:0.3rem}
.explore-wrap{max-width:520px;margin:0 auto;padding:0 0 5rem}
.search-bar{padding:1rem 1rem 0.8rem;border-bottom:1px solid var(--border)}
.search-inner{display:flex;align-items:center;gap:0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:0.55rem 1rem;transition:border-color 0.18s}
.search-inner:focus-within{border-color:var(--accent)}
.search-inner svg{width:15px;height:15px;color:var(--muted);flex-shrink:0}
.search-inp{flex:1;background:none;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:0.88rem;color:var(--text)}
.search-inp::placeholder{color:var(--muted)}
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
.ex-cell{aspect-ratio:1/1;overflow:hidden;cursor:pointer;background:var(--surface);position:relative;border-radius:4px}
.ex-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.2s}
.ex-cell:hover img{transform:scale(1.05)}
.ex-cell-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:var(--bg)}
.notif-wrap{max-width:520px;margin:0 auto;padding:0 0 5rem}
.section-hdr{padding:1rem 1.2rem 0.5rem;display:flex;align-items:center;justify-content:space-between}
.section-hdr h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
.section-hdr span{font-size:0.78rem;color:var(--muted)}
.notif-item{display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);transition:background 0.15s}
.notif-item.unread{background:rgba(124,106,255,0.05)}
.notif-icon-wrap{width:38px;height:38px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;flex-shrink:0}
.notif-icon-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.notif-body{flex:1;font-size:0.83rem;line-height:1.45}
.notif-body strong{color:var(--text);font-weight:700}
.notif-ts{font-size:0.68rem;color:var(--muted);white-space:nowrap}
.notif-thumb{width:38px;height:38px;border-radius:8px;overflow:hidden;background:var(--surface);flex-shrink:0}
.notif-thumb img{width:100%;height:100%;object-fit:cover}
.bk-wrap{max-width:520px;margin:0 auto;padding:0 1rem 5rem}
.bk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.8rem;padding-top:0.5rem}
.bk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:transform 0.15s;cursor:pointer}
.bk-card:hover{transform:scale(1.02)}
.bk-thumb{aspect-ratio:1/1;overflow:hidden;background:var(--surface)}
.bk-thumb img{width:100%;height:100%;object-fit:cover}
.bk-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;background:var(--bg)}
.bk-info{padding:0.5rem 0.6rem}
.bk-author{font-size:0.68rem;font-weight:700;color:var(--muted)}
.bk-caption{font-size:0.78rem;color:var(--text);margin-top:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.av-upload-zone{display:flex;flex-direction:column;align-items:center;gap:0.8rem;padding:0.5rem 0}
.av-upload-preview{width:88px;height:88px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#fff;border:3px solid var(--accent);cursor:pointer}
.av-upload-preview img{width:100%;height:100%;object-fit:cover}
.av-hint{font-size:0.76rem;color:var(--muted)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════
//  SUPABASE CONFIG
// ═══════════════════════════════════════════
const SB_URL='https://ehzmxsxztzmxxnsnjwce.supabase.co';
const SB_KEY='sb_publishable_tK_Ug2YimE1vFnm0I3IPcw_LwDKw-eV';

async function sb(path,opts={}){
  try{
    const res=await fetch(SB_URL+'/rest/v1/'+path,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
      ...opts
    });
    if(!res.ok&&res.status!==204){
      const e=await res.text();
      console.error('SB error',res.status,path,e);
      let msg='';try{msg=JSON.parse(e).message||JSON.parse(e).error||e}catch{msg=e}
      window._sbLastError=msg;
      return null;
    }
    if(res.status===204)return true;
    const t=await res.text();return t?JSON.parse(t):true;
  }catch(e){console.error('SB fetch error',e);window._sbLastError=e.message;return null}
}
const sbGet=(table,query='')=>sb(table+'?'+query,{method:'GET'});
const sbPost=(table,body)=>sb(table,{method:'POST',body:JSON.stringify(body)});
const sbPatch=(table,query,body)=>sb(table+'?'+query,{method:'PATCH',body:JSON.stringify(body)});
const sbDelete=(table,query)=>sb(table+'?'+query,{method:'DELETE'});
const sbUpsert=(table,body)=>sb(table,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(body)});

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const MOODS=[
  {emoji:'😊',label:'Happy'},{emoji:'🔥',label:'On Fire'},
  {emoji:'💙',label:'Chill'},{emoji:'😤',label:'Frustrated'},
  {emoji:'✨',label:'Inspired'},{emoji:'😴',label:'Tired'},
  {emoji:'🥰',label:'Grateful'},{emoji:'🤔',label:'Curious'},
  {emoji:'🎉',label:'Excited'},{emoji:'😔',label:'Sad'},
];
const REACTIONS=['❤️','😂','😮','👏','🔥','💯'];

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const nowISO=()=>new Date().toISOString();
const ago=iso=>{const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Date.now()+'_'+Math.random().toString(36).slice(2,7);
const j=v=>typeof v==='string'?v:JSON.stringify(v);
const pj=v=>{try{return typeof v==='string'?JSON.parse(v):v}catch{return v}};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let S={
  user:null,posts:[],notifications:[],bookmarks:[],loaded:false,tab:'feed',
  authTab:'login',authError:'',authLoading:false,authName:'',authEmail:'',authPass:'',
  showCreate:false,createCaption:'',createTags:'',createMood:null,
  createImgPreview:null,createImgB64:null,createImgMime:null,createMod:null,createBusy:false,
  searchQ:'',viewingProfile:null,
  showEditProfile:false,editBio:'',editAvPreview:null,editAvatarBg:true,
  confirmDel:null,toast:null,
};
function setState(p){Object.assign(S,p);render()}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let _tt=null,_st=null;
function toast(msg){if(_tt)clearTimeout(_tt);setState({toast:msg});_tt=setTimeout(()=>{S.toast=null;render()},2800)}
function debounceRender(){if(_st)clearTimeout(_st);_st=setTimeout(render,200)}

// ═══════════════════════════════════════════
//  SESSION (localStorage — just stores email+pass locally for auto-login)
// ═══════════════════════════════════════════
function saveSession(u){try{localStorage.setItem('flick_session',JSON.stringify({email:u.email,pass:u.pass}))}catch{}}
function loadSessionData(){try{const s=localStorage.getItem('flick_session');return s?JSON.parse(s):null}catch{return null}}
function clearSession(){try{localStorage.removeItem('flick_session')}catch{}}

// ═══════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════
async function handleAuth(){
  const email=(S.authEmail||'').trim().toLowerCase();
  const pass=(S.authPass||'').trim();
  const name=(S.authName||'').trim();
  setState({authError:'',authLoading:true});
  try{
    if(S.authTab==='register'){
      if(!name||!email||!pass){setState({authError:'All fields required.',authLoading:false});return}
      if(pass.length<4){setState({authError:'Password must be 4+ characters.',authLoading:false});return}
      const existing=await sbGet('users','email=eq.'+encodeURIComponent(email)+'&select=email');
      if(existing&&existing.length>0){setState({authError:'Email already registered.',authLoading:false});return}
      const u={id:'u_'+uid(),name,email,pass,bio:'',avatar:null,avatar_bg:true,created_at:nowISO()};
      const res=await sbPost('users',u);
      if(!res){setState({authError:'Could not create account: '+(window._sbLastError||'Unknown error'),authLoading:false});return}
      saveSession(u);
      await loadUserData(u);
    } else {
      if(!email||!pass){setState({authError:'Email and password required.',authLoading:false});return}
      const res=await sbGet('users','email=eq.'+encodeURIComponent(email)+'&select=*');
      if(!res||!res.length){setState({authError:'Invalid credentials.',authLoading:false});return}
      const u=res[0];
      if(u.pass!==pass){setState({authError:'Invalid credentials.',authLoading:false});return}
      saveSession(u);
      await loadUserData(u);
    }
  }catch(e){console.error(e);setState({authError:'Something went wrong.',authLoading:false})}
}

async function handleLogout(){
  clearSession();
  setState({user:null,posts:[],notifications:[],bookmarks:[],loaded:false,tab:'feed',authName:'',authEmail:'',authPass:''});
}

// ═══════════════════════════════════════════
//  LOAD USER DATA
// ═══════════════════════════════════════════
async function loadUserData(u){
  const [postsRaw,notifsRaw,bksRaw]=await Promise.all([
    sbGet('posts','select=*&order=created_at.desc'),
    sbGet('notifications','user_id=eq.'+encodeURIComponent(u.email)+'&select=*&order=created_at.desc'),
    sbGet('bookmarks','user_id=eq.'+encodeURIComponent(u.email)+'&select=*'),
  ]);
  const posts=(postsRaw||[]).map(p=>({...p,reactions:pj(p.reactions||'{}'),comments:pj(p.comments||'[]'),tags:pj(p.tags||'[]'),mood:pj(p.mood)}));
  setState({user:u,posts,notifications:notifsRaw||[],bookmarks:bksRaw||[],loaded:true,authLoading:false,authName:'',authEmail:'',authPass:'',authError:''});
}

// ═══════════════════════════════════════════
//  IMAGE LOADER
// ═══════════════════════════════════════════
function loadImg(file,cb){
  if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=e=>{const d=e.target.result;cb(d,d.split(',')[1],file.type)};
  r.readAsDataURL(file);
}

// ═══════════════════════════════════════════
//  CREATE POST
// ═══════════════════════════════════════════
async function runMod(){
  const {createCaption:cap,createImgB64:b64,createImgMime:mime}=S;
  if(!b64&&!cap.trim())return null;
  setState({createMod:'checking'});
  const parts=[];
  if(b64)parts.push({type:'image',source:{type:'base64',media_type:mime||'image/jpeg',data:b64}});
  const prompt=b64
    ?`Content moderation AI. Check this image${cap?` and caption "${cap}"`:''}. Look for: nudity, violence, hate speech, dangerous activities, harassment, spam, self-harm. Respond ONLY with JSON: {"safe":true,"confidence":"high","reason":"Content looks appropriate","flags":[]}`
    :`Content moderation AI. Check this text: "${cap}". Look for: hate speech, explicit content, harassment, threats, spam. Respond ONLY with JSON: {"safe":true,"confidence":"high","reason":"Text looks appropriate","flags":[]}`;
  parts.push({type:'text',text:prompt});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:parts}]})});
    const data=await res.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
    const result=JSON.parse(raw.replace(/```json|```/g,'').trim());
    setState({createMod:result});return result;
  }catch{const r={safe:true,confidence:'low',reason:'Moderation unavailable.',flags:[]};setState({createMod:r});return r}
}

async function handlePublish(){
  const {createCaption:cap,createImgB64:b64,createImgPreview:prev,createMood:mood,createTags:tags,user:u}=S;
  if(!cap.trim()&&!b64)return;
  setState({createBusy:true});
  let mod=S.createMod;
  if(!mod||mod==='checking')mod=await runMod();
  if(!mod.safe){setState({createBusy:false});return}
  const post={
    id:'post_'+uid(),author_id:u.email,author_name:u.name,author_avatar:u.avatar||null,author_avatar_bg:u.avatar_bg!==false,
    caption:cap.trim(),image:prev||null,mood:j(mood),
    tags:j(tags.split(' ').map(t=>t.trim()).filter(t=>t.startsWith('#')&&t.length>1)),
    reactions:j({}),comments:j([]),created_at:nowISO(),moderated:true,
  };
  const res=await sbPost('posts',post);
  if(!res){setState({createBusy:false});toast('Failed to post: '+(window._sbLastError||'Unknown error'));return}
  const newPost={...post,reactions:{},comments:[],tags:pj(post.tags),mood:pj(post.mood)};
  setState({posts:[newPost,...S.posts],showCreate:false,createBusy:false,createCaption:'',createTags:'',createMood:null,createImgPreview:null,createImgB64:null,createImgMime:null,createMod:null});
  toast('✦ Post shared!');
}

// ═══════════════════════════════════════════
//  POST ACTIONS
// ═══════════════════════════════════════════
async function handleReact(postId,emoji){
  const {user:u,posts}=S;if(!u)return;
  const post=posts.find(p=>p.id===postId);if(!post)return;
  const r=JSON.parse(JSON.stringify(post.reactions||{}));
  if(!r[emoji])r[emoji]=[];
  const idx=r[emoji].indexOf(u.email);
  const adding=idx<0;
  if(idx>=0)r[emoji].splice(idx,1);else r[emoji].push(u.email);
  await sbPatch('posts','id=eq.'+postId,{reactions:j(r)});
  setState({posts:posts.map(p=>p.id===postId?{...p,reactions:r}:p)});
  if(adding&&post.author_id!==u.email){
    const n={id:'n_'+uid(),user_id:post.author_id,type:'reaction',emoji,from_name:u.name,from_avatar:u.avatar||null,post_id:postId,post_image:post.image||null,created_at:nowISO(),read:false};
    await sbPost('notifications',n);
  }
}

async function handleComment(postId){
  const {user:u,posts}=S;
  const inp=document.getElementById('ci_'+postId);
  if(!inp||!inp.value.trim()||!u)return;
  const text=inp.value.trim();inp.value='';
  const post=posts.find(p=>p.id===postId);if(!post)return;
  const c={id:'c_'+uid(),author_id:u.email,author_name:u.name,author_avatar:u.avatar||null,text,created_at:nowISO()};
  const newComments=[...(post.comments||[]),c];
  await sbPatch('posts','id=eq.'+postId,{comments:j(newComments)});
  setState({posts:posts.map(p=>p.id===postId?{...p,comments:newComments}:p)});
  if(post.author_id!==u.email){
    const n={id:'n_'+uid(),user_id:post.author_id,type:'comment',from_name:u.name,from_avatar:u.avatar||null,post_id:postId,post_image:post.image||null,text,created_at:nowISO(),read:false};
    await sbPost('notifications',n);
  }
}

async function handleDelPost(id){
  await sbDelete('posts','id=eq.'+id);
  setState({posts:S.posts.filter(p=>p.id!==id),confirmDel:null});
  toast('Post deleted.');
}

async function toggleBookmark(postId){
  const {user:u,bookmarks}=S;if(!u)return;
  const key=u.email+'_'+postId;
  const ex=bookmarks.find(b=>b.key===key);
  if(ex){
    await sbDelete('bookmarks','key=eq.'+encodeURIComponent(key));
    setState({bookmarks:bookmarks.filter(b=>b.key!==key)});toast('Bookmark removed.');
  }else{
    const bk={key,user_id:u.email,post_id:postId,saved_at:nowISO()};
    await sbPost('bookmarks',bk);
    setState({bookmarks:[...bookmarks,bk]});toast('✦ Bookmarked!');
  }
}

function showAllComments(postId){
  const el=document.getElementById('ca_'+postId),btn=document.getElementById('vm_'+postId);
  if(el&&btn){el.classList.remove('hidden');btn.style.display='none'}
}

// ═══════════════════════════════════════════
//  PROFILE
// ═══════════════════════════════════════════
function openEdit(){setState({showEditProfile:true,editBio:S.user.bio||'',editAvPreview:null,editAvatarBg:S.user.avatar_bg!==false})}

async function saveProfile(){
  const {user:u,editBio,editAvPreview,editAvatarBg}=S;
  const upd={...u,bio:editBio.trim(),avatar:editAvPreview||u.avatar,avatar_bg:editAvatarBg};
  await sbPatch('users','email=eq.'+encodeURIComponent(u.email),{bio:upd.bio,avatar:upd.avatar,avatar_bg:upd.avatar_bg,name:upd.name});
  saveSession(upd);
  // update posts with new avatar/name
  const updPosts=S.posts.map(p=>{
    if(p.author_id===u.email)return{...p,author_avatar:upd.avatar,author_name:upd.name,author_avatar_bg:upd.avatar_bg};
    return p;
  });
  // batch update posts in background
  updPosts.filter(p=>p.author_id===u.email).forEach(p=>sbPatch('posts','id=eq.'+p.id,{author_avatar:p.author_avatar,author_name:p.author_name,author_avatar_bg:p.author_avatar_bg}));
  setState({user:upd,posts:updPosts,showEditProfile:false});
  toast('Profile updated!');
}

// ═══════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════
async function markRead(){
  const {notifications:ns,user:u}=S;
  await sbPatch('notifications','user_id=eq.'+encodeURIComponent(u.email)+'&read=eq.false',{read:true});
  setState({notifications:ns.map(n=>({...n,read:true}))});
}

// ═══════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════
function rAv(name,avatar,cls='',extraStyle='',avatarBg=true){
  const bg=avatarBg?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--bg)';
  const s=` style="background:${bg}${extraStyle?';'+extraStyle:''}"`;
  if(avatar)return`<div class="avatar${cls?' '+cls:''}"${s}><img src="${esc(avatar)}" alt="${esc(name)}"/></div>`;
  return`<div class="avatar${cls?' '+cls:''}"${s}>${esc((name||'?')[0].toUpperCase())}</div>`;
}

function rModStatus(){
  const ms=S.createMod;if(!ms)return'';
  if(ms==='checking')return`<div class="mod-status checking"><span class="mod-icon"><span class="spinner"></span></span><div class="mod-text"><strong>Checking content…</strong>AI is reviewing your post.</div></div>`;
  if(ms.safe)return`<div class="mod-status safe"><span class="mod-icon">✅</span><div class="mod-text"><strong>Looks good!</strong>${esc(ms.reason)}</div></div>`+(ms.confidence==='low'?`<div class="mod-status warn" style="margin-top:-0.5rem"><span class="mod-icon">⚠️</span><div class="mod-text"><strong>Low confidence</strong>Post with care.</div></div>`:'');
  return`<div class="mod-status unsafe"><span class="mod-icon">🚫</span><div class="mod-text"><strong>Blocked — policy violation</strong>${esc(ms.reason)}</div></div>`;
}

function rPost(post){
  const {user:u,bookmarks}=S;
  const reactions=post.reactions||{};
  const comments=post.comments||[];
  const liked=u&&(reactions['❤️']||[]).includes(u.email);
  const lc=(reactions['❤️']||[]).length;
  const cc=comments.length;
  const isOwn=u&&post.author_id===u.email;
  const bkKey=u?u.email+'_'+post.id:'';
  const isBk=bookmarks.some(b=>b.key===bkKey);
  const mood=pj(post.mood);

  const imgHtml=post.image
    ?`<div class="post-image-wrap"><img class="img-blur-bg" src="${esc(post.image)}" aria-hidden="true"/><img class="img-main" src="${esc(post.image)}" alt="post" loading="lazy"/></div>`
    :`<div class="post-no-image">${mood?esc(mood.emoji):'💬'}</div>`;

  const extraReacts=REACTIONS.filter(e=>e!=='❤️').map(em=>{
    const cnt=(reactions[em]||[]).length;
    const act=u&&(reactions[em]||[]).includes(u.email);
    return(cnt>0||act)?`<button class="action-btn${act?' liked':''}" onclick="handleReact('${post.id}','${em}')">${em}${cnt>0?' '+cnt:''}</button>`:'';
  }).join('');

  const chips=REACTIONS.filter(e=>e!=='❤️').map(em=>{
    const cnt=(reactions[em]||[]).length;
    const act=u&&(reactions[em]||[]).includes(u.email);
    return`<button class="reaction-chip${act?' active':''}" onclick="handleReact('${post.id}','${em}')">${em}${cnt>0?`<span class="count">${cnt}</span>`:''}</button>`;
  }).join('');

  const tags=pj(post.tags)||[];
  const tagsHtml=tags.length?`<div style="margin-top:0.4rem">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:'';
  const caption=post.caption?`<div class="post-caption"><strong>${esc(post.author_name)}</strong>${esc(post.caption)}${tagsHtml}</div>`:'';

  const hasMore=comments.length>2;
  const visible=hasMore?comments.slice(-2):comments;
  const rC=c=>{
    const cav=c.author_avatar?`<div class="c-av"><img src="${esc(c.author_avatar)}"/></div>`:`<div class="c-av">${esc((c.author_name||'?')[0].toUpperCase())}</div>`;
    return`<div class="comment-line">${cav}<span class="c-txt"><strong>${esc(c.author_name)}</strong>${esc(c.text)}</span></div>`;
  };

  const uAvSm=u&&u.avatar?`<div class="avatar" style="width:26px;height:26px;font-size:0.6rem;overflow:hidden;background:${u.avatar_bg!==false?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--bg)'}"><img src="${esc(u.avatar)}"/></div>`:`<div class="avatar" style="width:26px;height:26px;font-size:0.6rem">${esc((u?.name||'?')[0].toUpperCase())}</div>`;
  const moodBadge=mood?`<span class="post-mood-badge">${esc(mood.emoji)} ${esc(mood.label)}</span>`:'';
  const delBtn=isOwn?`<button class="post-menu-btn" onclick="event.stopPropagation();setState({confirmDel:'${post.id}'})" title="Delete"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>`:'';

  return`
<div class="post-card" id="post-${post.id}">
  <div class="post-header" style="cursor:pointer" onclick="viewProfile('${post.author_id}')">
    ${rAv(post.author_name,post.author_avatar,'avatar-ring','',post.author_avatar_bg!==false)}
    <div class="post-author-info">
      <div class="post-author-name">${esc(post.author_name)}</div>
      <div class="post-time">${ago(post.created_at)}</div>
    </div>
    ${moodBadge}${delBtn}
  </div>
  ${imgHtml}
  <div class="post-actions">
    <button class="action-btn${liked?' liked':''}" onclick="handleReact('${post.id}','❤️')">
      <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      ${lc>0?lc:''}
    </button>
    <button class="action-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      ${cc>0?cc:''}
    </button>
    <div class="action-spacer"></div>
    ${extraReacts}
    <button class="action-btn${isBk?' saved':''}" onclick="toggleBookmark('${post.id}')">
      <svg viewBox="0 0 24 24" fill="${isBk?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
  <div class="reactions-row">${chips}</div>
  ${caption}
  <div class="comments-preview">
    ${hasMore?`<button class="view-more-btn" id="vm_${post.id}" onclick="showAllComments('${post.id}')">View all ${comments.length} comments</button>`:''}
    ${hasMore?`<div id="ca_${post.id}" class="hidden">${comments.map(rC).join('')}</div>`:''}
    ${visible.map(rC).join('')}
  </div>
  <div class="add-comment-row">
    ${uAvSm}
    <input class="comment-input" id="ci_${post.id}" placeholder="${u?'Add a comment…':'Sign in to comment'}" ${u?'':'disabled'} onkeydown="if(event.key==='Enter')handleComment('${post.id}')"/>
    <button class="send-btn" onclick="handleComment('${post.id}')">Post</button>
  </div>
</div>`;
}

function rStoriesBar(){
  const {posts,user:u}=S;
  const seen=new Map();
  posts.forEach(p=>{if(!seen.has(p.author_id))seen.set(p.author_id,{id:p.author_id,name:p.author_name,img:p.author_avatar||p.image})});
  const authors=[...seen.values()].slice(0,12);
  const add=u?`<div class="story-bubble add-story-btn" onclick="setState({showCreate:true})"><div class="story-ring"><div class="story-ring-inner">+</div></div><span class="story-name">Your Post</span></div>`:'';
  const bubbles=authors.map(a=>`<div class="story-bubble" onclick="viewProfile('${esc(a.id)}')"><div class="story-ring"><div class="story-ring-inner">${a.img?`<img src="${esc(a.img)}" alt="${esc(a.name)}"/>`:`${esc(a.name[0].toUpperCase())}`}</div></div><span class="story-name">${esc(a.name.split(' ')[0])}</span></div>`).join('');
  return`<div class="stories-bar">${add}${bubbles}</div>`;
}

// ═══════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════
function rCreateModal(){
  const {createCaption:cap,createTags:tags,createMood:mood,createImgPreview:prev,createMod:mod,createBusy:busy}=S;
  const canPost=(cap.trim()||prev)&&mod?.safe===true;
  const moodPills=MOODS.map(m=>`<button class="mood-pill${mood?.label===m.label?' selected':''}" onclick="S.createMood=${mood?.label===m.label?'null':`{emoji:'${m.emoji}',label:'${m.label}'}`};render()">${m.emoji} ${m.label}</button>`).join('');
  const imgSection=prev
    ?`<div style="position:relative"><img src="${esc(prev)}" class="preview-img" alt="preview"/><button class="btn btn-sm btn-danger" style="position:absolute;top:8px;right:8px" onclick="setState({createImgPreview:null,createImgB64:null,createMod:null})">Remove</button></div>`
    :`<div class="drop-zone" onclick="document.getElementById('fi_post').click()" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="event.preventDefault();this.classList.remove('drag-over');loadImg(event.dataTransfer.files[0],(d,b,m)=>setState({createImgPreview:d,createImgB64:b,createImgMime:m,createMod:null}))"><div class="dz-icon">📸</div><p>Drop a photo here or <span>browse</span></p><p style="font-size:0.75rem;margin-top:0.3rem;opacity:0.6">JPG PNG GIF WEBP</p></div><input type="file" id="fi_post" accept="image/*" style="display:none" onchange="loadImg(this.files[0],(d,b,m)=>setState({createImgPreview:d,createImgB64:b,createImgMime:m,createMod:null}))"/>`;
  const checkBtn=!mod||mod==='checking'
    ?`<button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="runMod()" ${mod==='checking'||(!cap.trim()&&!prev)?'disabled':''}>${mod==='checking'?'<span class="spinner"></span> Checking…':'🛡️ Check Content'}</button>`:'';
  return`
<div class="modal-overlay" onclick="if(event.target===this)setState({showCreate:false})">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">New Post</span><button class="modal-close" onclick="setState({showCreate:false})">×</button></div>
    <div class="modal-body">
      ${imgSection}
      <div class="field"><label>Caption</label>
        <textarea id="create-caption" maxlength="400" rows="3" placeholder="What's on your mind?" oninput="S.createCaption=this.value;S.createMod=null;document.getElementById('cap-count').textContent=this.value.length+'/400'">${esc(cap)}</textarea>
        <div class="char-count" id="cap-count">${cap.length}/400</div>
      </div>
      <div class="field"><label>Tags (space-separated)</label><input type="text" value="${esc(tags)}" placeholder="#travel #photography #vibes" oninput="S.createTags=this.value"/></div>
      <div class="field"><label>Mood</label><div class="mood-grid">${moodPills}</div></div>
      ${rModStatus()}
      <div style="display:flex;gap:0.7rem">
        ${checkBtn}
        <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="handlePublish()" ${!canPost||busy?'disabled':''}>${busy?'<span class="spinner"></span> Publishing…':'Share Post ✦'}</button>
      </div>
      ${!mod?`<p style="font-size:0.75rem;color:var(--muted);text-align:center">Content is automatically verified before publishing</p>`:''}
    </div>
  </div>
</div>`;
}

function rEditModal(){
  const {user:u,editBio,editAvPreview,editAvatarBg}=S;
  const src=editAvPreview||u.avatar;
  const bg=editAvatarBg?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--bg)';
  const avHtml=src
    ?`<div class="av-upload-preview" style="background:${bg}" onclick="document.getElementById('fi_av').click()"><img src="${esc(src)}"/></div>`
    :`<div class="av-upload-preview" style="background:${bg}" onclick="document.getElementById('fi_av').click()">${esc(u.name[0].toUpperCase())}</div>`;
  return`
<div class="modal-overlay" onclick="if(event.target===this)setState({showEditProfile:false,editAvPreview:null})">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit Profile</span><button class="modal-close" onclick="setState({showEditProfile:false,editAvPreview:null})">×</button></div>
    <div class="modal-body">
      <div class="av-upload-zone">
        ${avHtml}
        <span class="av-hint">Tap to change profile photo</span>
        <input type="file" id="fi_av" accept="image/*" style="display:none" onchange="loadImg(this.files[0],(d)=>setState({editAvPreview:d}))"/>
        <label style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;font-size:0.82rem;color:var(--muted);margin-top:0.2rem" onclick="setState({editAvatarBg:!S.editAvatarBg})">
          <div style="width:38px;height:22px;border-radius:50px;background:${editAvatarBg?'var(--accent)':'var(--border)'};position:relative;transition:background 0.2s;flex-shrink:0;cursor:pointer">
            <div style="position:absolute;top:3px;left:${editAvatarBg?'18px':'3px'};width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s"></div>
          </div>
          Gradient background
        </label>
      </div>
      <div class="field"><label>Display Name</label><input type="text" value="${esc(u.name)}" oninput="S.user={...S.user,name:this.value}"/></div>
      <div class="field"><label>Bio</label>
        <textarea id="edit-bio" rows="3" maxlength="160" placeholder="Tell the world about you…" oninput="S.editBio=this.value;document.getElementById('bio-count').textContent=this.value.length+'/160'">${esc(editBio)}</textarea>
        <div class="char-count" id="bio-count">${editBio.length}/160</div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>`;
}

function rConfirmDel(){
  const id=S.confirmDel;if(!id)return'';
  return`
<div class="modal-overlay" onclick="if(event.target===this)setState({confirmDel:null})">
  <div class="confirm-box">
    <h3>Delete post?</h3><p>This can't be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="setState({confirmDel:null})">Cancel</button>
      <button class="btn btn-danger" onclick="handleDelPost('${id}')">Delete</button>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════
//  VIEW OTHER PROFILE
// ═══════════════════════════════════════════
async function viewProfile(authorId){
  const {user:u}=S;
  if(authorId===u.email){setState({tab:'profile',viewingProfile:null});return}
  // fetch full user record
  const res=await sbGet('users','email=eq.'+encodeURIComponent(authorId)+'&select=*');
  const profile=res&&res.length?res[0]:{email:authorId,name:authorId,avatar:null,avatar_bg:true,bio:''};
  setState({viewingProfile:profile,tab:'viewprofile'});
}

function rViewProfile(){
  const {viewingProfile:p,posts}=S;
  if(!p)return'';
  const mine=posts.filter(x=>x.author_id===p.email);
  const totalLikes=mine.reduce((a,x)=>a+(x.reactions['❤️']||[]).length,0);
  const totalComments=mine.reduce((a,x)=>a+(x.comments||[]).length,0);
  const avBg=p.avatar_bg!==false?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--bg)';
  const avHtml=p.avatar
    ?`<div class="avatar avatar-xl avatar-ring" style="overflow:hidden;background:${avBg}"><img src="${esc(p.avatar)}"/></div>`
    :`<div class="avatar avatar-xl avatar-ring" style="background:${avBg}">${esc((p.name||'?')[0].toUpperCase())}</div>`;
  return`<div>
    <div style="max-width:520px;margin:0 auto;padding:0.8rem 1.2rem 0">
      <button class="btn btn-ghost btn-sm" onclick="setState({tab:'feed',viewingProfile:null})">← Back</button>
    </div>
    <div class="profile-header">
      ${avHtml}
      <div class="profile-info">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem">${esc(p.name)}</div>
        ${p.bio?`<div class="profile-bio">${esc(p.bio)}</div>`:''}
        <div class="profile-stats">
          <div class="stat"><div class="num">${mine.length}</div><div class="lbl">Posts</div></div>
          <div class="stat"><div class="num">${totalLikes}</div><div class="lbl">Likes</div></div>
          <div class="stat"><div class="num">${totalComments}</div><div class="lbl">Comments</div></div>
        </div>
      </div>
    </div>
    <div class="feed">
      ${!mine.length
        ?`<div class="empty-feed"><div class="big-emoji">🌟</div><h3>No posts yet</h3></div>`
        :mine.map(rPost).join('')}
    </div>
  </div>`;
}


function rFeed(){
  const {posts,loaded}=S;
  return`${rStoriesBar()}<div class="feed">
    ${!loaded?`<div class="empty-feed"><div class="big-emoji">⏳</div><h3>Loading…</h3></div>`:''}
    ${loaded&&!posts.length?`<div class="empty-feed"><div class="big-emoji">📸</div><h3>Nothing here yet</h3><p style="margin-bottom:1.5rem">Be the first!</p><button class="btn btn-primary" onclick="setState({showCreate:true})">Share your first post</button></div>`:''}
    ${posts.map(rPost).join('')}
  </div>`;
}

function rExplore(){
  const {posts,searchQ:q}=S;
  const filtered=q.trim()
    ?posts.filter(p=>p.caption?.toLowerCase().includes(q.toLowerCase())||p.author_name?.toLowerCase().includes(q.toLowerCase())||(pj(p.tags)||[]).some(t=>t.toLowerCase().includes(q.toLowerCase())))
    :posts;
  const cells=filtered.map(p=>`<div class="ex-cell">${p.image?`<img src="${esc(p.image)}" loading="lazy"/>`:`<div class="ex-cell-ph">${pj(p.mood)?esc(pj(p.mood).emoji):'💬'}</div>`}</div>`).join('');
  return`<div class="explore-wrap">
    <div class="search-bar"><div class="search-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-inp" placeholder="Search posts, people, tags…" value="${esc(q)}" oninput="S.searchQ=this.value;debounceRender()"/>
    </div></div>
    ${!filtered.length?`<div class="empty-feed"><div class="big-emoji">🔍</div><h3>${q.trim()?'No results':'No posts yet'}</h3></div>`:`<div class="explore-grid">${cells}</div>`}
  </div>`;
}

function rNotifications(){
  const {notifications:ns}=S;
  if(!ns.length)return`<div class="empty-feed"><div class="big-emoji">🔔</div><h3>No notifications</h3><p>Likes and comments will appear here.</p></div>`;
  const items=ns.map(n=>{
    const av=n.from_avatar?`<div class="notif-icon-wrap"><img src="${esc(n.from_avatar)}"/></div>`:`<div class="notif-icon-wrap">${n.type==='reaction'?n.emoji:'💬'}</div>`;
    const thumb=n.post_image?`<div class="notif-thumb"><img src="${esc(n.post_image)}"/></div>`:'';
    const msg=n.type==='reaction'
      ?`<strong>${esc(n.from_name)}</strong> reacted ${n.emoji} to your post`
      :`<strong>${esc(n.from_name)}</strong> commented: "${esc((n.text||'').slice(0,45))}${(n.text||'').length>45?'…':''}"`;
    return`<div class="notif-item${n.read?'':' unread'}">${av}<div class="notif-body">${msg}</div><div class="notif-ts">${ago(n.created_at)}</div>${thumb}</div>`;
  }).join('');
  return`<div class="notif-wrap"><div class="section-hdr"><h2>Notifications</h2><button class="btn btn-ghost btn-sm" onclick="markRead()">Mark all read</button></div>${items}</div>`;
}

function rBookmarks(){
  const {bookmarks,posts}=S;
  if(!bookmarks.length)return`<div class="empty-feed"><div class="big-emoji">🔖</div><h3>No bookmarks</h3><p>Tap the bookmark icon on any post to save it.</p></div>`;
  const saved=bookmarks.map(b=>posts.find(p=>p.id===b.post_id)).filter(Boolean);
  const cards=saved.map(p=>`<div class="bk-card"><div class="bk-thumb">${p.image?`<img src="${esc(p.image)}" loading="lazy"/>`:`<div class="bk-thumb-ph">${pj(p.mood)?esc(pj(p.mood).emoji):'💬'}</div>`}</div><div class="bk-info"><div class="bk-author">${esc(p.author_name)}</div><div class="bk-caption">${esc(p.caption||'(no caption)')}</div></div></div>`).join('');
  return`<div class="bk-wrap"><div class="section-hdr"><h2>Saved Posts</h2><span>${saved.length} saved</span></div><div class="bk-grid">${cards}</div></div>`;
}

function rProfile(){
  const {user:u,posts,bookmarks}=S;
  const mine=posts.filter(p=>p.author_id===u.email);
  const totalLikes=mine.reduce((a,p)=>a+(p.reactions['❤️']||[]).length,0);
  const totalComments=mine.reduce((a,p)=>a+(p.comments||[]).length,0);
  const avBg=u.avatar_bg!==false?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--bg)';
  const avHtml=u.avatar
    ?`<div class="avatar avatar-xl avatar-ring" style="overflow:hidden;background:${avBg}"><img src="${esc(u.avatar)}"/></div>`
    :`<div class="avatar avatar-xl avatar-ring" style="background:${avBg}">${esc(u.name[0].toUpperCase())}</div>`;
  return`<div>
    <div class="profile-header">
      <div class="avatar-wrap" onclick="openEdit()">${avHtml}<div class="av-overlay">📷 Edit</div></div>
      <div class="profile-info">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem">${esc(u.name)}</div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:0.15rem">${esc(u.email)}</div>
        ${u.bio?`<div class="profile-bio">${esc(u.bio)}</div>`:''}
        <div class="profile-stats">
          <div class="stat"><div class="num">${mine.length}</div><div class="lbl">Posts</div></div>
          <div class="stat"><div class="num">${totalLikes}</div><div class="lbl">Likes</div></div>
          <div class="stat"><div class="num">${totalComments}</div><div class="lbl">Comments</div></div>
          <div class="stat"><div class="num">${bookmarks.length}</div><div class="lbl">Saved</div></div>
        </div>
      </div>
    </div>
    <div style="max-width:520px;margin:0 auto;padding:0.8rem 1.2rem 0;display:flex;gap:0.6rem">
      <button class="btn btn-ghost btn-sm" onclick="openEdit()">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Profile
      </button>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Sign Out</button>
    </div>
    <div class="feed">
      ${!mine.length?`<div class="empty-feed"><div class="big-emoji">🌟</div><h3>No posts yet</h3><button class="btn btn-primary" style="margin-top:1rem" onclick="setState({tab:'feed',showCreate:true})">Share something</button></div>`:mine.map(rPost).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  AUTH PAGE
// ═══════════════════════════════════════════
function rAuth(){
  const {authTab:t,authError:err,authLoading:busy}=S;
  const name=t==='register'?`<div class="field"><label>Display Name</label><input type="text" placeholder="Your name" value="${esc(S.authName)}" oninput="S.authName=this.value"/></div>`:'';
  return`<div class="auth-page">
    <div class="auth-glow auth-glow-1"></div><div class="auth-glow auth-glow-2"></div>
    <div class="auth-card">
      <div class="auth-logo"><h1>Flick ✦</h1><p>Share moments. Spark conversations.</p></div>
      <div class="auth-tabs">
        <button class="auth-tab${t==='login'?' active':''}" onclick="setState({authTab:'login',authError:'',authName:'',authEmail:'',authPass:''})">Sign In</button>
        <button class="auth-tab${t==='register'?' active':''}" onclick="setState({authTab:'register',authError:'',authName:'',authEmail:'',authPass:''})">Join</button>
      </div>
      <div class="auth-fields">
        ${err?`<div class="error-banner">${esc(err)}</div>`:''}
        ${name}
        <div class="field"><label>Email</label><input type="email" placeholder="you@example.com" value="${esc(S.authEmail)}" oninput="S.authEmail=this.value"/></div>
        <div class="field"><label>Password</label><input type="password" placeholder="••••••••" value="${esc(S.authPass)}" oninput="S.authPass=this.value" onkeydown="if(event.key==='Enter')handleAuth()"/></div>
        <button class="btn btn-primary" onclick="handleAuth()" ${busy?'disabled':''} style="width:100%;justify-content:center;padding:0.75rem">${busy?'<span class="spinner"></span>':t==='login'?'Sign In':'Create Account'}</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════
function rApp(){
  const {user:u,tab,showCreate,showEditProfile,confirmDel,toast:t,notifications:ns}=S;
  const unread=ns.filter(n=>!n.read).length;
  const tabContent={feed:rFeed,explore:rExplore,notifications:rNotifications,bookmarks:rBookmarks,profile:rProfile,viewprofile:rViewProfile}[tab]?.()??'';
  const avBg=u.avatar_bg!==false?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--bg)';
  const uAv=u.avatar?`<div class="avatar avatar-ring" style="overflow:hidden;background:${avBg}"><img src="${esc(u.avatar)}"/></div>`:rAv(u.name,null,'avatar-ring','',u.avatar_bg!==false);
  return`<div class="app">
    <header class="topbar">
      <div class="topbar-logo">Flick ✦</div>
      <div class="topbar-actions" onclick="setState({tab:'profile'})">${uAv}<span style="font-size:0.8rem;font-weight:700;color:var(--muted)">${esc(u.name)}</span></div>
    </header>
    ${tabContent}
    <nav class="bottom-nav">
      <button class="nav-item${tab==='feed'?' active':''}" onclick="setState({tab:'feed'})">
        <svg viewBox="0 0 24 24" fill="${tab==='feed'?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Feed</span>
      </button>
      <button class="nav-item${tab==='explore'?' active':''}" onclick="setState({tab:'explore'})">
        <svg viewBox="0 0 24 24" fill="${tab==='explore'?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Explore</span>
      </button>
      <button class="nav-post-btn" onclick="setState({showCreate:true})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="nav-item${tab==='notifications'?' active':''}" onclick="setState({tab:'notifications'})">
        <svg viewBox="0 0 24 24" fill="${tab==='notifications'?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        ${unread>0?`<span class="nav-badge">${unread>9?'9+':unread}</span>`:''}
        <span>Alerts</span>
      </button>
      <button class="nav-item${tab==='bookmarks'?' active':''}" onclick="setState({tab:'bookmarks'})">
        <svg viewBox="0 0 24 24" fill="${tab==='bookmarks'?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Saved</span>
      </button>
    </nav>
    ${showCreate?rCreateModal():''}
    ${showEditProfile?rEditModal():''}
    ${confirmDel?rConfirmDel():''}
    ${t?`<div class="toast">${esc(t)}</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  document.getElementById('root').innerHTML=S.user?rApp():rAuth();
}

// ═══════════════════════════════════════════
//  BOOT — try auto-login from saved session
// ═══════════════════════════════════════════
(async()=>{
  const session=loadSessionData();
  if(session){
    const res=await sbGet('users','email=eq.'+encodeURIComponent(session.email)+'&select=*');
    if(res&&res.length&&res[0].pass===session.pass){
      await loadUserData(res[0]);return;
    }
  }
  render();
})();
</script>
</body>
